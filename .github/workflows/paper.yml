name: paper

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jansky-research
        uses: actions/checkout@v4
        with:
          path: jansky-research
      - name: Checkout jansky (the library dependency)
        uses: actions/checkout@v4
        with:
          repository: joebarbere/jansky
          ref: v0.1.0
          path: jansky
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Generate every slice's figures + macros via the static-slice DAG (Snakemake, offline)
        working-directory: jansky-research
        env:
          UV_PYTHON: "3.12" # the `workflow` extra (Snakemake) needs Python >=3.11
        run: |
          uv sync --extra workflow
          uv run --extra workflow snakemake -s workflow/Snakefile -j4
      - name: Install tectonic
        uses: WtfJoke/setup-tectonic@v3
      - name: Compile every paper (main + any extra, e.g. the RNAAS note)
        working-directory: jansky-research
        run: |
          for tex in papers/*/*.tex; do
            grep -ql '\\documentclass' "$tex" || continue
            echo "==> building $tex"
            (cd "$(dirname "$tex")" && tectonic "$(basename "$tex")")
          done
      - name: Upload the PDFs
        uses: actions/upload-artifact@v4
        with:
          name: papers
          path: jansky-research/papers/*/*.pdf
