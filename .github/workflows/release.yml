name: release

# Packages every slice's paper as a PDF into a single zip archive and attaches it to a GitHub
# Release. Fires on a version tag (v*); also runnable on demand from the Actions tab (the zip is
# always uploaded as a workflow artifact, and additionally published to a Release when a tag drove
# the run).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create/update the GitHub Release and upload the asset

jobs:
  papers-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jansky-research
        uses: actions/checkout@v4
        with:
          path: jansky-research
      - name: Checkout jansky (the library dependency)
        uses: actions/checkout@v4
        with:
          repository: joebarbere/jansky
          ref: v0.1.0
          path: jansky
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Generate every slice's figures + macros via the static-slice DAG (Snakemake, offline)
        working-directory: jansky-research
        env:
          UV_PYTHON: "3.12" # the `workflow` extra (Snakemake) needs Python >=3.11
        run: |
          uv sync --extra workflow --extra fdmt
          uv run --extra workflow snakemake -s workflow/Snakefile -j4
      - name: Install tectonic
        uses: WtfJoke/setup-tectonic@v3
      - name: Compile every paper (main + any extra, e.g. an RNAAS note)
        working-directory: jansky-research
        run: |
          fail=0
          for tex in papers/*/*.tex; do
            grep -ql '\\documentclass' "$tex" || continue
            echo "==> building $tex"
            if ! (cd "$(dirname "$tex")" && tectonic "$(basename "$tex")"); then
              echo "::error::failed to compile $tex"
              fail=1
            fi
          done
          exit $fail
      - name: Stage the PDFs and build the zip archive
        working-directory: jansky-research
        run: |
          set -euo pipefail
          # Human-friendly tag for the archive name (the tag on a tag-push, else the short SHA).
          TAG="${GITHUB_REF_NAME}"
          case "${GITHUB_REF}" in refs/tags/*) : ;; *) TAG="dev-$(git rev-parse --short HEAD)" ;; esac
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          STAGE="jansky-research-papers-$TAG"
          mkdir -p "dist/$STAGE"
          MANIFEST="dist/$STAGE/MANIFEST.txt"
          {
            echo "jansky-research papers -- $TAG"
            echo "generated $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "commit $(git rev-parse HEAD)"
            echo
            printf '%-28s  %s\n' "slice / paper" "pdf"
          } > "$MANIFEST"
          n=0
          # Each papers/<slice>/<name>.pdf -> dist/<STAGE>/<slice>/<name>.pdf, recorded in MANIFEST.
          for pdf in papers/*/*.pdf; do
            [ -e "$pdf" ] || continue
            slice="$(basename "$(dirname "$pdf")")"
            mkdir -p "dist/$STAGE/$slice"
            cp "$pdf" "dist/$STAGE/$slice/"
            printf '%-28s  %s\n' "$slice" "$(basename "$pdf")" >> "$MANIFEST"
            n=$((n + 1))
          done
          echo "staged $n PDFs"
          if [ "$n" -eq 0 ]; then echo "::error::no PDFs were produced"; exit 1; fi
          (cd dist && zip -r "$STAGE.zip" "$STAGE" >/dev/null)
          echo "ZIP=jansky-research/dist/$STAGE.zip" >> "$GITHUB_ENV"
          ls -la "dist/$STAGE.zip"
          cat "$MANIFEST"
      - name: Upload the zip as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: papers-zip-${{ env.TAG }}
          path: jansky-research/dist/*.zip
          if-no-files-found: error
      - name: Publish the zip to a GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: jansky-research/dist/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
